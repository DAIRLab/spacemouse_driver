zero_when_static: true

# The number of polls needed to be done before the device is considered "static"
static_count_threshold: 30

# Set the translational deadband
static_trans_deadband: 50

# Set the rotational deadband
static_rot_deadband: 50

# For normalizing output values from SpaceMouse to [-1, 1]
full_scale: 512.0

# Map raw SpaceMouse axes [x, y, z] and [rx, ry, rz] into published robot-frame
# linear/angular axes. This matches the original Franka driver behavior.
linear_axis: [0, 2, 1]
linear_sign: [1.0, 1.0, 1.0]
angular_axis: [0, 2, 1]
angular_sign: [1.0, 1.0, 1.0]
